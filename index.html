<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="CSS/mainstyle.css">
  <title>Orange Tool - Store</title>
  <link rel="icon" href="/image/favicon-32x32.png" type="image/x-icon">
</head>

<body>
  <header data-aos="fade-down">
    <button type="button" class="abrir-menu" id="abrir">
      <i class="bi bi-list"></i>
    </button>

    <div class="logo-nav">
      <img src="image/Orange_Key_color.svg" alt="Logo Orange Tool">
    </div>

    <nav class="nav" id="nav">
      <button type="button" class="cerrar-menu" id="cerrar">
        <i class="bi bi-x-lg"></i>
      </button>

      <ul class="nav-list">
        <li class="poppins-bold"><a href="#">INICIO</a></li>
        <li class="poppins-regular"><a href="#">PRODUCTOS</a></li>
        <li class="poppins-regular"><a href="#">NOSOTROS</a></li>
        <li class="poppins-regular"><a href="#">CONTACTO</a></li>
      </ul>
    </nav>

    <div class="icons_profile_carrito">
      <div class="carrito" id="btnCarrito">
        <i class="bi bi-cart2"></i>
        <span class="nav__carrito-contador" id="contadorCarrito">0</span>
      </div>

      <div class="login_register">
        <i class="bi bi-person"></i>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero_bg_texto">
        RK61 60%
      </div>
      <div class="hero_producto_img">
        <img src="image/Keyboards/RK61_60/RK71_60_WM.png" alt="Teclado mecánico RK61 60%">
      </div>
      <div class="hero_prod_inf">
        <p class="hero_prod_titulo poppins-bold">Teclado Mecánico</p>
        <p class="hero_prod_parrafo poppins-regular">
          Teclado inalámbrico 60% Triple Modo BT5.0 / 2.4G / USB-C,
          61 teclas, teclado compacto para juegos con software.
        </p>
      </div>
      <div class="hero__scroll">
        <i class="bi bi-arrow-down-circle"></i>
        <span>SCROLL PARA VER MÁS</span>
      </div>
    </section>
    <section class="productos">
      <div class="productos__header">
        <h2 class="productos__titulo poppins-bold" data-aos="fade-up">Productos Recientes</h2>
        <div class="productos__controles">
          <div class="productos__buscador" data-aos="fade-up">
            <i class="bi bi-search"></i>
            <input type="text" class="productos__input poppins-regular" placeholder="Buscar producto..."
              id="inputBuscar" />
          </div>
          <button class="productos__filtro poppins-regular" id="btnFiltro" data-aos="fade-up">
            <i class="bi bi-sliders"></i>
            Filtrar
          </button>
        </div>
      </div>
      <div class="productos__grid" id="gridProductos">
      </div>
    </section>
  </main>

  <div class="filtro-overlay" id="filtroOverlay"></div>
  <aside class="filtro-panel" id="filtroPanel">
    <div class="filtro-panel__header">
      <h3 class="filtro-panel__titulo poppins-bold">Filtros</h3>
      <button class="filtro-panel__cerrar" id="btnCerrarFiltro">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="filtro-panel__grupo">
      <p class="filtro-panel__label poppins-bold">Marca</p>
      <select class="filtro-panel__select poppins-regular" id="filtroMarca">
        <option value="">Todas</option>
        <option value="RK Royal Kludge">RK Royal Kludge</option>
        <option value="Attack Shark Ajazz">Attack Shark Ajazz</option>
        <option value="Terport">Terport</option>
      </select>
    </div>
    <div class="filtro-panel__grupo">
      <p class="filtro-panel__label poppins-bold">Formato</p>
      <select class="filtro-panel__select poppins-regular" id="filtroFormato">
        <option value="">Todos</option>
        <option value="60%">60%</option>
        <option value="75%">75%</option>
        <option value="80%">80%</option>
        <option value="90%">90%</option>
      </select>
    </div>
    <div class="filtro-panel__grupo">
      <p class="filtro-panel__label poppins-bold">Precio</p>
      <select class="filtro-panel__select poppins-regular" id="filtroPrecio">
        <option value="">Sin orden</option>
        <option value="menor">Menor a mayor</option>
        <option value="mayor">Mayor a menor</option>
      </select>
    </div>
    <div class="filtro-panel__botones">
      <button class="filtro-panel__btn-aplicar poppins-bold" id="btnAplicarFiltro">
        Aplicar
      </button>
      <button class="filtro-panel__btn-borrar poppins-regular" id="btnBorrarFiltro">
        Borrar filtros
      </button>
    </div>
  </aside>

  <div class="carrito-overlay" id="carritoOverlay"></div>
  <aside class="carrito-panel" id="carritoPanel">
    <div class="carrito-panel__header">
      <h3 class="carrito-panel__titulo poppins-bold">Tu carrito</h3>
      <button class="carrito-panel__cerrar" id="btnCerrarCarrito">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="carrito-panel__items" id="carritoItems"></div>
    <div class="carrito-panel__footer">
      <div class="carrito-panel__total">
        <span class="poppins-bold">Total</span>
        <span class="poppins-bold" id="carritoTotal">$0.00</span>
      </div>
      <button class="carrito-panel__btn-comprar poppins-bold" id="btnComprar">
        Comprar
      </button>
      <button class="carrito-panel__btn-borrar poppins-regular" id="btnBorrarCarrito">
        Vaciar carrito
      </button>
    </div>

  </aside>

  <script src="JS/burgermenu.js"></script>
  <script src="JS/hero.js"></script>
  <script src="JS/productos.js"></script>
  <script src="JS/main.js"></script>
  <script src="JS/carrito.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>

</html>
